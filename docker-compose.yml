services:
  mongodb:
    # OBRIGATÓRIO: imagem Atlas Local — suporta $vectorSearch, $search e $rankFusion.
    # NÃO usar a imagem padrão `mongo`, que não tem esses operadores.
    image: mongodb/mongodb-atlas-local:latest
    container_name: dmdoc-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: dmdoc-redis
    ports:
      - '5052:6379'
    volumes:
      - redis_data:/data
    command: ['redis-server', '--appendonly', 'yes']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  unstructured:
    image: downloads.unstructured.io/unstructured-io/unstructured-api:latest
    container_name: dmdoc-unstructured
    ports:
      - '5053:8000'
    environment:
      UNSTRUCTURED_API_KEY: ''

  minio:
    image: minio/minio:latest
    container_name: dmdoc-minio
    ports:
      - '5054:9000'   # API S3-compatible
      - '5055:9001'   # Console web (http://localhost:5055)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ':9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Cria o bucket automaticamente na primeira vez que o compose sobe
  minio-init:
    image: minio/mc:latest
    container_name: dmdoc-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/dmdoc-documents &&
        echo 'Bucket dmdoc-documents pronto.'
      "
    restart: 'no'

volumes:
  mongodb_data:
  redis_data:
  minio_data:
