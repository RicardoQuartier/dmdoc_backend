name: dmdoc-backend

services:
  # ---------------- Infraestrutura ----------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dmdoc-postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: dmdoc
      POSTGRES_PASSWORD: dmdoc
      POSTGRES_DB: dmdoc
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dmdoc -d dmdoc']
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: dmdoc-redis
    ports:
      - '5052:6379'
    volumes:
      - redis_data:/data
    command: ['redis-server', '--appendonly', 'yes']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Microserviço de extração de texto (Python) — unifica TODOS os formatos:
  # PyMuPDF (PDF), python-docx (DOCX), openpyxl (XLSX), python-pptx (PPTX) e
  # Tesseract para scans/imagens (RG, CNH, certificados). Comunicação via fila Redis
  # (BRPOP extract:requests → download S3 → RPUSH extract:result:{id}) — sem timeout HTTP.
  extractor:
    build:
      context: ./services/extractor
    container_name: dmdoc-extractor
    environment:
      EXTRACT_TIMEOUT_S: '480'
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: dmdoc-documents
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    ports:
      - '5056:8000'
    mem_limit: 1g
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD', 'python', '-c', "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  minio:
    image: minio/minio:latest
    container_name: dmdoc-minio
    ports:
      - '5054:9000'   # API S3-compatible (http://localhost:5054 — usado por S3_PUBLIC_ENDPOINT)
      - '5055:9001'   # Console web (http://localhost:5055)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ':9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Cria o bucket automaticamente na primeira vez que o compose sobe
  minio-init:
    image: minio/mc:latest
    container_name: dmdoc-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/dmdoc-documents &&
        echo 'Bucket dmdoc-documents pronto.'
      "
    restart: 'no'

  # ---------- Instalação de deps (one-shot) ----------
  backend-install:
    image: node:22-slim
    working_dir: /app
    environment:
      CI: 'true'
    volumes:
      - .:/app
      - backend_root_nm:/app/node_modules
      - backend_api_nm:/app/apps/api/node_modules
      - backend_worker_nm:/app/apps/worker/node_modules
      - backend_shared_nm:/app/packages/shared-types/node_modules
    command: >
      sh -c "corepack enable && pnpm install &&
        pnpm --filter @dmdoc/shared-types build &&
        pnpm --filter @dmdoc/extractor build &&
        pnpm --filter @dmdoc/llm-provider build &&
        pnpm --filter @dmdoc/db-pg build &&
        pnpm --filter @dmdoc/db-mongo build"

  # ---------- Migrations (one-shot, roda no boot) ----------
  # Aplica as migrations pendentes do Postgres via o mecanismo oficial do
  # projeto (drizzle-kit migrate — usa migrations/meta/_journal.json e a tabela
  # de controle drizzle.__drizzle_migrations). Roda após a instalação de deps e
  # com o Postgres saudável; api/worker só sobem depois dela concluir. Isso
  # evita schema drift (banco atrás do repo) — causa do 500 em /admin/tenants
  # quando a migração 0004_ai_feature_flags não havia sido aplicada.
  backend-migrate:
    image: node:22-slim
    container_name: dmdoc-backend-migrate
    working_dir: /app
    command: sh -c "corepack enable && pnpm --filter @dmdoc/db-pg migrate"
    environment:
      DATABASE_URL: postgresql://dmdoc:dmdoc@postgres:5432/dmdoc
    volumes:
      - .:/app
      - backend_root_nm:/app/node_modules
      - backend_api_nm:/app/apps/api/node_modules
      - backend_worker_nm:/app/apps/worker/node_modules
      - backend_shared_nm:/app/packages/shared-types/node_modules
    restart: 'no'
    depends_on:
      backend-install:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  # ---------------- API (hot-reload via tsx watch) ----------------
  api:
    image: node:22-slim
    working_dir: /app
    command: sh -c "corepack enable && pnpm --filter @dmdoc/api dev"
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://dmdoc:dmdoc@postgres:5432/dmdoc
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      # Endpoint público para assinar URLs de download/preview. minio:9000 é o host
      # interno do Docker (irresolvível pelo navegador); o presigner precisa do host
      # publicado para o host. MinIO publica a porta S3 (9000) em localhost:5054.
      S3_PUBLIC_ENDPOINT: http://localhost:5054
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_S3_BUCKET: dmdoc-documents
      AWS_REGION: us-east-1
      S3_FORCE_PATH_STYLE: 'true'
      EXTRACTOR_URL: http://extractor:8000/extract
      CHOKIDAR_USEPOLLING: 'true'
    ports:
      - '5051:5051'
    volumes:
      - .:/app
      - backend_root_nm:/app/node_modules
      - backend_api_nm:/app/apps/api/node_modules
      - backend_worker_nm:/app/apps/worker/node_modules
      - backend_shared_nm:/app/packages/shared-types/node_modules
    depends_on:
      backend-install:
        condition: service_completed_successfully
      backend-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  # ---------------- Worker (hot-reload via tsx watch) ----------------
  worker:
    image: node:22-slim
    working_dir: /app
    command: sh -c "corepack enable && pnpm --filter @dmdoc/worker dev"
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://dmdoc:dmdoc@postgres:5432/dmdoc
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_S3_BUCKET: dmdoc-documents
      AWS_REGION: us-east-1
      S3_FORCE_PATH_STYLE: 'true'
      EXTRACT_BLPOP_TIMEOUT_SECS: '900'
      CHOKIDAR_USEPOLLING: 'true'
    volumes:
      - .:/app
      - backend_root_nm:/app/node_modules
      - backend_api_nm:/app/apps/api/node_modules
      - backend_worker_nm:/app/apps/worker/node_modules
      - backend_shared_nm:/app/packages/shared-types/node_modules
    depends_on:
      backend-install:
        condition: service_completed_successfully
      backend-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      extractor:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  minio_data:
  backend_root_nm:
  backend_api_nm:
  backend_worker_nm:
  backend_shared_nm:
