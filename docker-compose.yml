name: dmdoc-backend

services:
  # ---------------- Infraestrutura ----------------
  mongodb:
    # OBRIGATÓRIO: imagem Atlas Local — suporta $vectorSearch, $search e $rankFusion.
    # NÃO usar a imagem padrão `mongo`, que não tem esses operadores.
    image: mongodb/mongodb-atlas-local:latest
    container_name: dmdoc-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: dmdoc-redis
    ports:
      - '5052:6379'
    volumes:
      - redis_data:/data
    command: ['redis-server', '--appendonly', 'yes']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Microserviço de extração de texto (Python) — unifica TODOS os formatos:
  # PyMuPDF (PDF), python-docx (DOCX), openpyxl (XLSX), python-pptx (PPTX) e
  # EasyOCR para scans/imagens (RG, CNH, certificados). Substitui o Unstructured
  # e o NativeExtractor. Não recusa documentos de identidade (ao contrário de LLMs)
  # e corrige rotação. Chamado por HTTP pelo worker.
  extractor:
    build:
      context: ./services/extractor
    container_name: dmdoc-extractor
    environment:
      # CPUs antigas (ex.: i3 3ª geração / Ivy Bridge) têm AVX mas NÃO têm AVX2/FMA.
      # O PyTorch (via EasyOCR) usa kernels AVX2/FMA por padrão e quebra com SIGILL
      # (exit 132 / "Illegal instruction"). O torch só aceita 'default', 'avx2' ou
      # 'avx512' aqui — 'default' força o baseline (sem AVX2), única opção que roda
      # nessas CPUs. Mais lento no OCR, porém universal.
      ATEN_CPU_CAPABILITY: default
    ports:
      - '5056:8000'

  minio:
    image: minio/minio:latest
    container_name: dmdoc-minio
    ports:
      - '9000:9000'   # API S3-compatible
      - '9001:9001'   # Console web (http://localhost:5055)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ':9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Cria o bucket automaticamente na primeira vez que o compose sobe
  minio-init:
    image: minio/mc:latest
    container_name: dmdoc-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/dmdoc-documents &&
        echo 'Bucket dmdoc-documents pronto.'
      "
    restart: 'no'

  # ---------- Instalação de deps (one-shot) ----------
  backend-install:
    image: node:22-slim
    working_dir: /app
    environment:
      CI: 'true'
    volumes:
      - .:/app
      - backend_root_nm:/app/node_modules
      - backend_api_nm:/app/apps/api/node_modules
      - backend_worker_nm:/app/apps/worker/node_modules
      - backend_shared_nm:/app/packages/shared-types/node_modules
    command: sh -c "corepack enable && pnpm install && pnpm --filter @dmdoc/shared-types build"

  # ---------------- API (hot-reload via tsx watch) ----------------
  api:
    image: node:22-slim
    working_dir: /app
    command: sh -c "corepack enable && pnpm --filter @dmdoc/api dev"
    env_file:
      - ./.env
    environment:
      MONGO_URI: mongodb://mongodb:27017?directConnection=true
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_S3_BUCKET: dmdoc-documents
      AWS_REGION: us-east-1
      S3_FORCE_PATH_STYLE: 'true'
      CHOKIDAR_USEPOLLING: 'true'
    ports:
      - '5051:5051'
    volumes:
      - .:/app
      - backend_root_nm:/app/node_modules
      - backend_api_nm:/app/apps/api/node_modules
      - backend_worker_nm:/app/apps/worker/node_modules
      - backend_shared_nm:/app/packages/shared-types/node_modules
    depends_on:
      backend-install:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  # ---------------- Worker (hot-reload via tsx watch) ----------------
  worker:
    image: node:22-slim
    working_dir: /app
    command: sh -c "corepack enable && pnpm --filter @dmdoc/worker dev"
    env_file:
      - ./.env
    environment:
      MONGO_URI: mongodb://mongodb:27017?directConnection=true
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_S3_BUCKET: dmdoc-documents
      AWS_REGION: us-east-1
      S3_FORCE_PATH_STYLE: 'true'
      EXTRACTOR: python
      EXTRACTOR_URL: http://extractor:8000/extract
      CHOKIDAR_USEPOLLING: 'true'
    volumes:
      - .:/app
      - backend_root_nm:/app/node_modules
      - backend_api_nm:/app/apps/api/node_modules
      - backend_worker_nm:/app/apps/worker/node_modules
      - backend_shared_nm:/app/packages/shared-types/node_modules
    depends_on:
      backend-install:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      extractor:
        condition: service_started

volumes:
  mongodb_data:
  redis_data:
  minio_data:
  backend_root_nm:
  backend_api_nm:
  backend_worker_nm:
  backend_shared_nm:
